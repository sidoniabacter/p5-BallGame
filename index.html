<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5</title>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <script>
      const boardWidth = 800;
      const boardHeight = 600;

      let bricks = [];
      let balls = [];

      const numbersOfBricksByRow = 5;
      const numbersOfBricksByColumn = 3;
      const numberOfBalls = 1;

      const SmilefaceHead = {
        x: 300,
        y: 415,
        size: 30,
        color: "yellow",
        isMoving: true,
        setIntervalID: 0,
        speed: 5,
        sensX: 1,
        sensY: -1,
        init: function (x, y, speed = 5, size = 35, color = "yellow") {
          this.x = x;
          this.y = y;
          this.speed = speed;
          this.size = size;
          this.color = color;
          this.setInterval = setInterval(() => {
            if (this.isMoving) {
              this.checkIfWallHit();
              this.checkIfBallHitPaddle(
                Paddle.x,
                Paddle.y,
                Paddle.width,
                Paddle.height,
              );
              this.x = this.x + this.sensX;
              this.y = this.y + this.sensY;
            }
          }, this.speed);
        },
        draw: function (x, y, size, color) {
          //head
          fill(this.color);
          circle(this.x, this.y, this.size);
          //eyes
          circle(this.x - this.size / 5, this.y - this.size / 5, this.size / 5);
          circle(this.x + this.size / 5, this.y - this.size / 5, this.size / 5);
          //right pupile
          fill("blue");
          circle(
            this.x + this.size / 5,
            this.y - this.size / 5,
            this.size / 10,
          );
          fill(this.color);
          //left pupile
          fill("blue");
          circle(
            this.x - this.size / 5,
            this.y - this.size / 5,
            this.size / 10,
          );
          fill(this.color);

          // nouse
          fill("orange");
          triangle(
            this.x,
            this.y,
            this.x - this.size / 12.5,
            this.y + this.size / 12.5,
            this.x + this.size / 12.5,
            this.y + this.size / 12.5,
          );

          // mouth
          fill("red");
          arc(
            this.x,
            this.y + this.size / 5,
            this.size / 2.5,
            this.size / 3.6,
            0,
            PI,
          );
          fill(this.color);
        },
        checkIfWallHit: function () {
          if (this.y - this.size / 2 <= 0) this.sensY = 1;
          //if (this.y + this.size / 2 >= boardHeight) this.sensY = -1;
          if (this.x - this.size / 2 <= 0) this.sensX = 1;
          if (this.x + this.size / 2 >= boardWidth) this.sensX = -1;
        },
        checkIfBallHitPaddle: function (x, y, width, height) {
          // if (this.y - this.size / 2 <= 0) this.sensY = 1;
          if (
            this.y + this.size / 2 >= y &&
            this.x >= x &&
            this.x <= x + width
          ) {
            this.sensY = -1;
            return;
          }

          if (
            this.x - this.size / 2 <= x + width &&
            this.x >= y &&
            this.x <= y + height
          ) {
            this.sensX = 1;
            return;
          }
          if (
            this.x + this.size / 2 >= x &&
            this.y >= y &&
            this.y <= y + height
          ) {
            this.sensX = -1;
            return;
          }
        },
      };

      // let smilefaceHeadX = 400;
      // let smilefaceHeadY = 400;

      const Brick = {
        x: 0,
        y: 0,
        color: [0, 0, 0],
        height: 0,
        width: 0,
        display: true,
        init: function (x, y, color, height, width) {
          this.x = x;
          this.y = y;
          this.color = color;
          this.height = height;
          this.width = width;
        },
        draw: function () {
          fill(this.color[0], this.color[1], this.color[2]);
          rect(this.x, this.y, this.width, this.height);
        },
        checkIfHit: function (ballX, ballY, ballRay) {
          if (
            ballY - ballRay <= this.y + this.height &&
            ballY + ballRay >= this.y &&
            ballX + ballRay >= this.x &&
            ballX - ballRay <= this.x + this.width
          ) {
            this.display = false;
            return true;
          }
          return false;
        },
      };

      const Paddle = {
        width: 100,
        height: 30,
        color: "black",
        x: 0,
        y: boardHeight - 50,
        draw: function () {
          this.x = mouseX - this.width / 2;
          fill(this.color);
          rect(this.x, this.y, this.width, this.height);
        },
      };

      let time = new Date();
      setInterval(() => {
        time = new Date();
      }, 1000);

      const Button = {
        x: 0,
        y: 0,
        width: 0,
        height: 0,
        color: "red",
        text: "Button",
        textColor: "white",
        textPadding: 20,
        init: function (x, y, width, height, color, text) {
          this.x = x;
          this.y = y;
          this.width = width;
          this.height = height;
          this.color = color;
          this.text = text;
        },
        draw: function () {
          fill(this.color);
          rect(this.x, this.y, this.width, this.height);
          fill(this.textColor);
          text(this.text, this.x + this.textPadding, this.y + this.textPadding);
        },
        checkIfClicked: function (callback) {
          if (
            mouseX >= this.x &&
            mouseX <= this.x + width &&
            mouseY >= this.y &&
            mouseY <= this.y + height
          ) {
            callback();
          }
        },
      };

      // const startButton = Object.create(Button);
      // startButton.init(200, 400, 80, 30, "green", "START");

      // const stopButton = Object.create(Button);
      // stopButton.init(600, 400, 70, 30, "RED", "STOP");

      function setup() {
        createCanvas(boardWidth, boardHeight);

        initBricks();

        initBalls();
      }

      function draw() {
        background("white");

        // startButton.draw();
        // stopButton.draw();

        showBricks();

        showBalls();
        Paddle.draw();
        showHour();
      }

      function mousePressed() {
        // startButton.checkIfClicked(() => {
        //   smilefaceHead.init();
        //   smilefaceHead.isMoving = true;
        //   smilefaceHead.timeOutID = setTimeout(() => {
        //     smilefaceHead.isMoving = false;
        //   }, 4700);
        // });
        // stopButton.checkIfClicked(() => {
        //   smilefaceHead.isMoving = false;
        // });
      }

      function initBricks() {
        const marginLR = 800 / 20;
        const paddingBetweenCols = 800 / 30;
        const bricksWidth =
          (800 -
            2 * marginLR -
            (numbersOfBricksByRow - 1) * paddingBetweenCols) /
          numbersOfBricksByRow;
        const marginTop = 80;
        const paddingBetweenRows = 40;
        for (let rowIndex = 0; rowIndex < numbersOfBricksByColumn; rowIndex++) {
          bricks.push([]);
          for (let colIndex = 0; colIndex < numbersOfBricksByRow; colIndex++) {
            const brick = Object.create(Brick);
            brick.init(
              marginLR + colIndex * (bricksWidth + paddingBetweenCols),
              marginTop + rowIndex * paddingBetweenRows,
              [
                Math.floor(Math.random() * 256),
                Math.floor(Math.random() * 256),
                Math.floor(Math.random() * 256),
              ],
              30,
              bricksWidth,
            );

            bricks[rowIndex].push(brick);
          }
        }
        console.log("bricks", bricks);
      }

      function showBricks() {
        bricks.forEach((bricksRow) => {
          bricksRow.forEach((brick) => {
            balls.forEach((ball) => {
              if (brick.checkIfHit(ball.x, ball.y, ball.size / 2)) {
                ball.speed = ball.speed - 10;
              }
            });

            if (brick.display) brick.draw();
          });
        });
      }

      function initBalls() {
        for (let ballIndex = 0; ballIndex < numberOfBalls; ballIndex++) {
          const ball = Object.create(SmilefaceHead);
          ball.init(
            Math.floor(Math.random() * 350),
            Math.floor(Math.random() * 400),
            // 20,
            // Math.floor(Math.random() * 50),
          );
          balls.push(ball);
        }
      }
      function showBalls() {
        balls.forEach((ball) => {
          ball.draw();
        });
      }

      function showHour() {
        //const formatTime =
        //time.getHours() + ":" + time.getMinutes() + ":" + time.getSeconds();
        const formatTime = `${time.getHours()}:${time.getMinutes()}:${time.getSeconds()}`;
        fill("black");
        text(formatTime, 20, 20);
      }
    </script>
  </body>
</html>
