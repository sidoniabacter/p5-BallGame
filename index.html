<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <script>
        const smilefaceHead = {
            x: 300,
            y: 415,
            size: 35,
            color: "yellow",
            isMoving: true,
            setIntervalId: 0,
            speed: 15,
            init: function () {
                this.x = 300
                this.y = 415
                this.setIntervalId = setInterval(() => {
                    if (this.isMoving) { 
                        this.x++
                        this.y--
                    }
                }, this.speed)
            },
            draw: function () {
                // HEAD
                fill(this.color)
                circle(this.x, this.y, this.size)

                // LEFT EYE
                circle(this.x - this.size / 5, this.y - this.size / 5, this.size / 5)
                fill("blue")
                circle(this.x - this.size / 5, this.y - this.size / 5, this.size / 10)
                fill(this.color)

                // RIGHT EYE
                circle(this.x + this.size / 5, this.y - this.size / 5, this.size / 5)
                fill("blue")
                circle(this.x + this.size / 5, this.y - this.size / 5, this.size / 10)
                fill(this.color)

                // NOSE
                fill("orange")
                triangle(this.x, this.y, this.x - this.size / 12.5, this.y + this.size / 12.5, this.x + this.size / 12.5, this.y + this.size / 12.5)

                // MOUTH
                fill("red")
                arc(this.x, this.y + this.size / 5, this.size / 2.5, this.size / 3.6, 0, PI)
                fill(this.color)
            }
        }

        const Brick = {
            x: 0,
            y: 0,
            color: [0, 0, 0],
            height: 0,
            width: 0,
            display: true,
            init: function (x, y, color, height, width) {
                this.x = x
                this.y = y
                this.color = color
                this.height = height
                this.width = width
            },
            draw: function () {
                fill(this.color[0], this.color[1], this.color[2])
                rect(this.x, this.y, this.width, this.height)
            },
            checkIfHit: function(ballX, ballY, ballRay) {
                if (ballY - ballRay <= this.y + this.height && 
                    ballY + ballRay >= this.y &&
                    ballX + ballRay >= this.x &&
                    ballX - ballRay <= this.x + this.width
                ) {
                    this.display = false
                }
            }
        }

        let bricks = []
        const numbersOfBricksByRow = 5
        const numbersOfBricksByColumn = 3

        let time = new Date()
        setInterval(() => {
            time = new Date()
        }, 1000);

        const Button = {
            x: 0,
            y: 0,
            width: 0,
            height: 0,
            color: "red",
            text: "button",
            textColor: "white",
            textPadding: 20,
            init: function (x, y, width, height, color, text) {
                this.x = x
                this.y = y
                this.width = width
                this.height = height
                this.color = color
                this.text = text
            },
            draw: function () {
                fill(this.color)
                rect(this.x, this.y, this.width, this.height)

                fill(this.textColor)
                text(this.text, this.x + this.textPadding, this.y + this.textPadding)
            },
            checkIfClicked: function (callback) {
                if ((mouseX >= this.x && mouseX <= this.x + this.width) &&
                    (mouseY >= this.y && mouseY <= this.y + this.height)
                ) {
                    callback()
                }
            },
        }

        // const startButton = Object.create(Button)
        // startButton.init(200, 400, 80, 30, "green", "START")

        // const stopButton = Object.create(Button)
        // stopButton.init(600, 400, 70, 30, "red", "STOP")

        function setup() {
            createCanvas(800, 800)

            smilefaceHead.init()

            initBricks()
        }

        function draw() {
            background("white")
            showBricks()

            smilefaceHead.draw()

            showHour()

            // startButton.draw()
            // stopButton.draw()
        }

        function mousePressed() {
            // startButton.checkIfClicked(() => {
            //    smilefaceHead.init()
            //    smilefaceHead.isMoving = true   
            //    smilefaceHead.timeOutId = setTimeout(() => {
            //     smilefaceHead.isMoving = false
            //    }, 4700)
            // })
            // stopButton.checkIfClicked(() => {
            //     smilefaceHead.isMoving = false
            // })
        }

        function initBricks() {
            const marignLR = 800 / 20
            const paddingBetweenCols = 800 / 30
            const brickWidth = (800 -
                2 * marignLR -
                (numbersOfBricksByRow - 1) * paddingBetweenCols
            ) / numbersOfBricksByRow
            const marignTop = 80;
            const paddingBetweenRows = 40;
            for (let rowIndex = 0; rowIndex < numbersOfBricksByColumn; rowIndex++) {
                bricks.push([])
                for (let colIndex = 0; colIndex < numbersOfBricksByRow; colIndex++) {
                    const brick = Object.create(Brick)
                    brick.init(marignLR + colIndex * (brickWidth + paddingBetweenCols),
                        marignTop + rowIndex * paddingBetweenRows,
                        [Math.floor(Math.random() * 256),
                        Math.floor(Math.random() * 256),
                        Math.floor(Math.random() * 256)],
                        30,
                        brickWidth)
                    bricks[rowIndex].push(brick)
                }
            }
            console.log("bricks", bricks)
        }

        function showBricks() {
            bricks.forEach(bricksRow => {
                bricksRow.forEach(brick => {
                    brick.checkIfHit(smilefaceHead.x, smilefaceHead.y, smilefaceHead.size / 2)
                    if (brick.display)
                        brick.draw()
                })
            })
        }

        function showHour() {
            //const formatTime = time.getHours() + ":" + time.getMinutes() + ":" + time.getSeconds()
            const formatTime = `${time.getHours()}:${time.getMinutes()}:${time.getSeconds()}`
            fill("black")
            text(formatTime, 20, 20)
        }

    </script>
</body>

</html>
